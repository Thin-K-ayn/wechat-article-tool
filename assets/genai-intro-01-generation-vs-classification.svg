  </text>

  <rect x="724" y="364" width="92" height="46" rx="16" fill="#E9F2EC" stroke="#C8DCCF" stroke-width="2"/>
  <text x="751" y="394" fill="#0C4A3B" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">
    文章
  </text>
  <rect x="834" y="364" width="92" height="46" rx="16" fill="#E9F2EC" stroke="#C8DCCF" stroke-width="2"/>
  <text x="861" y="394" fill="#0C4A3B" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">
    图片
  </text>
  <rect x="944" y="364" width="92" height="46" rx="16" fill="#E9F2EC" stroke="#C8DCCF" stroke-width="2"/>
  <text x="971" y="394" fill="#0C4A3B" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">
    语音
  </text>

  <g transform="translate(724 454)">
    <circle cx="12" cy="12" r="12" fill="#0C4A3B"/>
    <text x="36" y="20" fill="#4B5753" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600">
      输出空间近乎无法穷举
    </text>
  </g>
  <g transform="translate(724 498)">
    <circle cx="12" cy="12" r="12" fill="#0C4A3B"/>
    <text x="36" y="20" fill="#4B5753" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600">
      结果由很多小单位组成
    </text>
  </g>
  <g transform="translate(724 542)">
    <circle cx="12" cy="12" r="12" fill="#0C4A3B"/>
    <text x="36" y="20" fill="#4B5753" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600">
      目标是拼出新的合理结果
    </text>
  </g>

  <path d="M544 396H656" stroke="#9AAFA5" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 18"/>
  <circle cx="600" cy="396" r="46" fill="#F5FBF8" stroke="#D4E3DB" stroke-width="3"/>
  <text x="570" y="386" fill="#145B6A" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">
    都会
  </text>
  <text x="561" y="414" fill="#145B6A" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">
    输出
  </text>
</svg>
