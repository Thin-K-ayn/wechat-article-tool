    </text>

    <path d="M92 46H188" stroke="#91A6A0" stroke-width="6" stroke-linecap="round"/>

    <rect x="190" y="12" width="186" height="68" rx="22" fill="#EDF4F6" stroke="#BBD1D8" stroke-width="2"/>
