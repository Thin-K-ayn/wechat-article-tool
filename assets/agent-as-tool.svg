    <circle cx="60" cy="46" r="12" fill="#0C4A3B"/>
    <text x="-8" y="100" fill="#0C4A3B" font-family="PingFang SC, Noto Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700">
