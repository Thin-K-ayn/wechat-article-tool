<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="320" viewBox="0 0 1000 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="0" y="0" width="1000" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0B1D19" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1000" height="320" rx="28" fill="#F5F4EF"/>
  <g filter="url(#shadow)">
