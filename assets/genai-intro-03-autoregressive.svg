  </text>

  <g transform="translate(112 378)">
    <rect x="0" y="0" width="90" height="42" rx="16" fill="#F6EFE4" stroke="#DBC9AE" stroke-width="2"/>
    <text x="18" y="28" fill="#7B5D24" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">
      北京
    </text>

    <rect x="112" y="0" width="112" height="42" rx="16" fill="#F6EFE4" stroke="#DBC9AE" stroke-width="2"/>
    <text x="128" y="28" fill="#7B5D24" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">
      上海
    </text>

    <rect x="246" y="0" width="112" height="42" rx="16" fill="#F6EFE4" stroke="#DBC9AE" stroke-width="2"/>
    <text x="262" y="28" fill="#7B5D24" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">
      南京
    </text>
  </g>
  <g transform="translate(112 442)">
    <rect x="0" y="0" width="112" height="42" rx="16" fill="#F6EFE4" stroke="#DBC9AE" stroke-width="2"/>
    <text x="16" y="28" fill="#7B5D24" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">
      广州
    </text>

    <rect x="134" y="0" width="112" height="42" rx="16" fill="#F6EFE4" stroke="#DBC9AE" stroke-width="2"/>
    <text x="150" y="28" fill="#7B5D24" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">
      深圳
    </text>

    <rect x="268" y="0" width="146" height="42" rx="16" fill="#F6EFE4" stroke="#DBC9AE" stroke-width="2"/>
    <text x="286" y="28" fill="#7B5D24" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">
