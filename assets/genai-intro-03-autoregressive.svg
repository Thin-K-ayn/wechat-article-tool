  </text>

  <g transform="translate(706 388)">
    <rect x="0" y="0" width="76" height="58" rx="18" fill="#FFF4E2" stroke="#E1C48F" stroke-width="2"/>
    <text x="25" y="38" fill="#7B5D24" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="800">
      北
    </text>

    <path d="M94 29H126" stroke="#0C4A3B" stroke-width="6" stroke-linecap="round"/>
    <polygon points="126,20 144,29 126,38" fill="#0C4A3B"/>

    <rect x="160" y="0" width="76" height="58" rx="18" fill="#FFF4E2" stroke="#E1C48F" stroke-width="2"/>
    <text x="185" y="38" fill="#7B5D24" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="800">
      京
    </text>

    <path d="M254 29H286" stroke="#6B8FD0" stroke-width="6" stroke-linecap="round"/>
    <polygon points="286,20 304,29 286,38" fill="#6B8FD0"/>

    <rect x="322" y="14" width="92" height="30" rx="15" fill="#E7ECF8"/>
    <text x="340" y="35" fill="#4A67A3" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700">
      结束
    </text>
  </g>

  <rect x="136" y="610" width="928" height="84" rx="24" fill="#F3F8F5" stroke="#D0E1D8" stroke-width="2"/>
  <text x="600" y="662" text-anchor="middle" fill="#1A2A24" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700">
    整体生成问题，被拆成一连串局部选择
  </text>
</svg>
