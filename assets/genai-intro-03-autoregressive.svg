    </text>
  </g>

  <rect x="706" y="186" width="170" height="42" rx="21" fill="#DBECE3"/>
  <text x="734" y="214" fill="#0C4A3B" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">
