<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="86" y1="60" x2="1112" y2="704" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF7F0"/>
      <stop offset="1" stop-color="#EEF4F1"/>
    </linearGradient>
    <filter id="shadow-left" x="60" y="132" width="486" height="418" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#17322B" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-right" x="654" y="132" width="486" height="418" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#17322B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="36" fill="url(#bg)"/>

  <text x="88" y="94" fill="#18201D" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="800">
    整体生成 vs 局部预测
  </text>
  <text x="90" y="128" fill="#5C6763" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="500">
    关键不是一次选完整结果，而是把问题拆成一连串下一步预测
  </text>

  <g filter="url(#shadow-left)">
    <rect x="78" y="150" width="450" height="382" rx="30" fill="#FFFDF9"/>
  </g>
  <g filter="url(#shadow-right)">
    <rect x="672" y="150" width="450" height="382" rx="30" fill="#FFFDF9"/>
  </g>

  <rect x="112" y="186" width="184" height="42" rx="21" fill="#EDE3D4"/>
  <text x="138" y="214" fill="#7A6142" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">
    一次选完整结果
  </text>

  <text x="112" y="286" fill="#18201D" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700">
    目标空间太大
  </text>
  <text x="112" y="330" fill="#18201D" font-family="PingFang SC, Noto Sans SC, Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700">
